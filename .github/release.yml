changelog:
  exclude:
    labels:
      - ignore-for-release
      - dependencies
      - skip-changelog
    authors:
      - dependabot
      - github-actions[bot]
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
        - feat
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
        - bugfix
    - title: 📚 Documentation
      labels:
        - documentation
        - docs
    - title: 🎨 UI/UX
      labels:
        - ui
        - ux
        - design
    - title: 🏪 Store App
      labels:
        - store
        - storefront
    - title: 🔧 Admin App
      labels:
        - admin
        - dashboard
    - title: 🖥️ Desktop App
      labels:
        - desktop
        - electron
    - title: ☁️ Functions
      labels:
        - functions
        - firebase
        - backend
    - title: 📦 Components & Packages
      labels:
        - components
        - packages
        - shared
    - title: 🔨 Build & CI
      labels:
        - build
        - ci
        - deployment
    - title: ⚡ Performance
      labels:
        - performance
        - optimization
    - title: 🔒 Security
      labels:
        - security
    - title: ♿ Accessibility
      labels:
        - accessibility
        - a11y
    - title: 🌍 Internationalization
      labels:
        - i18n
        - translation
    - title: 🧪 Testing
      labels:
        - test
        - testing
    - title: 🛠️ Maintenance
      labels:
        - maintenance
        - chore
        - refactor
    - title: 📱 Mobile
      labels:
        - mobile
        - responsive
    - title: 🔗 Integrations
      labels:
        - integration
        - api
        - stripe
        - sendgrid
        - meilisearch
    - title: Other Changes
      labels:
        - "*"
