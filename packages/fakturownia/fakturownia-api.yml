        enabled: { type: boolean }
    Issuer:
      type: object
      additionalProperties: true
      properties:
        id: { type: integer, readOnly: true }
        name: { type: string }
        tax_no: { type: string }
        city: { type: string }
        company: { type: boolean }
        country: { type: string }
        created_at: { type: string, format: date-time }
        deleted: { type: boolean }
        email: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        note: { type: string }
        participation: { type: number, nullable: true }
        phone: { type: string }
        post_code: { type: string }
        role: { type: string, nullable: true }
        street: { type: string }
        updated_at: { type: string, format: date-time }
    Webhook:
      type: object
      additionalProperties: true
      properties:
        id: { type: integer, readOnly: true }
        url: { type: string }
        event: { type: string }
    ErrorResponse:
      type: object
      description: Base error response
      required: [statusCode, code, message]
      properties:
        statusCode:
          type: integer
          description: HTTP status code
        code:
          type: string
          description: Error code identifier
        message:
          type: string
          description: Human-readable error message
      x-ms-error-response: true
    ValidationErrorResponse:
      type: object
      description: Validation error with field-level details
      required: [statusCode, code]
      properties:
        statusCode:
          type: integer
          example: 422
          description: HTTP status code
        code:
          type: string
          example: validation_error
          description: Error code identifier
        message:
          type: object
          additionalProperties: true
          description: Field validation errors. Keys are field names, values are error messages (arrays of strings or objects)
      x-ms-error-response: true
    UnauthorizedErrorResponse:
      type: object
      description: Authentication required or invalid credentials
      required: [statusCode, code, message]
      properties:
        statusCode:
          type: integer
          example: 401
          description: HTTP status code
        code:
          type: string
          example: unauthorized
          description: Error code identifier
        message:
          type: string
          example: Authentication required
          description: Human-readable error message
      x-ms-error-response: true
    NotFoundErrorResponse:
      type: object
      description: Resource not found
      required: [statusCode, code, message]
      properties:
        statusCode:
          type: integer
          example: 404
          description: HTTP status code
        code:
          type: string
          example: not_found
          description: Error code identifier
        message:
          type: string
          example: Resource not found
          description: Human-readable error message
      x-ms-error-response: true
    InternalServerErrorResponse:
      type: object
      description: Internal server error
      required: [statusCode, code, message]
      properties:
        statusCode:
          type: integer
          example: 500
          description: HTTP status code
        code:
          type: string
          example: internal_error
          description: Error code identifier
        message:
          type: string
          example: An unexpected error occurred
          description: Human-readable error message
      x-ms-error-response: true
    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login: { type: string }
        password: { type: string }
        integration_token: { type: string }
    LoginResponse:
      type: object
      properties:
        login: { type: string }
        email: { type: string }
        prefix: { type: string }
        url: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        api_token:
          {
            type: string,
            description: "Returned only if user has generated API token",
          }
  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"
    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UnauthorizedErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/NotFoundErrorResponse"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InternalServerErrorResponse"
paths:
  /invoices.json:
    get:
      tags: [Invoices]
      summary: List invoices
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Period"
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - $ref: "#/components/parameters/IncludePositions"
        - $ref: "#/components/parameters/Income"
        - $ref: "#/components/parameters/ClientId"
        - $ref: "#/components/parameters/InvoiceIdsCsv"
        - $ref: "#/components/parameters/Number"
        - $ref: "#/components/parameters/Kind"
        - $ref: "#/components/parameters/Kinds"
        - $ref: "#/components/parameters/SearchDateType"
        - $ref: "#/components/parameters/Order"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Invoice" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
    post:
      tags: [Invoices]
      summary: Create invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                invoice:
                  $ref: "#/components/schemas/Invoice"
                fill_default_descriptions:
                  type: boolean
                  description: Add account default notes
                identify_oss:
                  type: string
                  enum: ["1", "0"]
                use_prices_from_price_lists:
                  type: string
                  enum: ["1", "0"]
                  description: Use prices from a price list instead of product card
                price_list_id:
                  type: integer
                  description: Price list ID used when use_prices_from_price_lists is true
              required: [invoice]
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Invoice" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
  /invoices/{id}.json:
    get:
      tags: [Invoices]
      summary: Get invoice by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: additional_fields[invoice]
          in: query
          schema:
            type: string
            description: Comma-separated fields to include (e.g., connected_payments,cancel_reason,corrected_content_before,corrected_content_after)
        - name: correction_positions
          in: query
          schema: { type: string, enum: [full] }
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Invoice" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Invoices]
      summary: Update invoice
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                invoice:
                  $ref: "#/components/schemas/Invoice"
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Invoice" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Invoices]
      summary: Delete invoice
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /invoices/{id}.pdf:
    get:
      tags: [Invoices]
      summary: Download invoice PDF
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: inline
          in: query
          schema: { type: string, enum: [yes] }
      responses:
        "200":
          description: PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
  /invoices/{id}/send_by_email.json:
    post:
      tags: [Invoices]
      summary: Send invoice by email
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: email_to
          in: query
          schema: { type: string, description: "Comma-separated (max 5)" }
        - name: email_cc
          in: query
          schema: { type: string }
        - name: email_pdf
          in: query
          schema: { type: boolean }
        - name: update_buyer_email
          in: query
          schema: { type: boolean }
        - name: print_option
          in: query
          schema:
            type: string
            enum: [original, copy, original_and_copy, duplicate]
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /invoices/{id}/change_status.json:
    post:
      tags: [Invoices]
      summary: Change invoice status
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: status
          in: query
          required: true
          schema:
            {
              type: string,
              enum: [issued, sent, paid, partial, rejected, completed],
            }
      responses:
        "200":
          description: Status changed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Invoice" }
  /invoices/cancel.json:
    post:
      tags: [Invoices]
      summary: Cancel invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cancel_invoice_id]
              properties:
                cancel_invoice_id: { type: integer }
                cancel_reason: { type: string }
      responses:
        "200":
          description: Canceled invoice
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Invoice" }
  /invoices/{id}/attachments_zip.json:
    get:
      tags: [Invoices]
      summary: Download all attachments as ZIP
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: ZIP archive
          content:
            application/zip:
              schema:
                type: string
                format: binary
  /invoices/{id}/get_new_attachment_credentials.json:
    get:
      tags: [Invoices]
      summary: Get upload credentials for attachment
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Upload credentials
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /invoices/{id}/add_attachment.json:
    post:
      tags: [Invoices]
      summary: Add uploaded attachment to invoice
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: file_name
          in: query
          required: true
          schema: { type: string }
        - name: visible_for_client
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Attachment added
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Invoice" }
  /invoices/fiscal_print:
    get:
      tags: [Invoices]
      summary: Fiscal print of invoices
      description: |
        Trigger fiscal printing of invoices. The fiskator_name parameter should contain 
        the printer ID obtained from /printers.json endpoint, not a text name.
      parameters:
        - name: invoice_ids[]
          in: query
          style: form
          explode: true
          schema:
            type: array
            items: { type: integer }
          required: true
        - name: fiskator_name
          in: query
          description: Numeric printer ID from /printers.json (despite the parameter name)
          schema: { type: string }
        - name: id
          in: query
          description: Single invoice ID (alternative to invoice_ids[])
          schema: { type: integer }
        - name: mode
          in: query
          description: Print mode for receipts
          schema:
            type: string
            enum: [e-receipt, print]
      responses:
        "200":
          description: Print job triggered
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /recurrings.json:
    get:
      tags: [Recurrings]
      summary: List recurring invoice definitions
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items: { type: object, additionalProperties: true }
    post:
      tags: [Recurrings]
      summary: Create recurring invoice definition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                recurring:
                  type: object
                  additionalProperties: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
  /recurrings/{id}.json:
    put:
      tags: [Recurrings]
      summary: Update recurring definition
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                recurring:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /clients.json:
    get:
      tags: [Clients]
      summary: List clients
      parameters:
