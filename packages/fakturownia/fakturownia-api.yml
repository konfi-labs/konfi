openapi: 3.0.3
info:
  title: Fakturownia API (Unofficial OpenAPI)
  version: "0.1.0"
  description: |
    Unofficial OpenAPI spec generated from https://github.com/fakturownia/API/blob/master/README.md.
    Notes:
    - Authentication is typically via api_token query param. README shows some bodies also carrying api_token; prefer query auth here.
    - Many resources accept rich payloads. Schemas include key fields and allow additional properties to accommodate full payloads.
servers:
  - url: https://{prefix}.fakturownia.pl
    description: Account-specific API host
    variables:
      prefix:
        default: YOUR_DOMAIN
        description: Subdomain/prefix of your account
tags:
  - name: Invoices
  - name: Recurrings
  - name: Clients
  - name: Products
  - name: Price Lists
  - name: Warehouse Documents
  - name: Warehouse Actions
  - name: Payments
  - name: Categories
  - name: Warehouses
  - name: Departments
  - name: Issuers
  - name: Printers
  - name: Account
  - name: Webhooks
  - name: Auth
security:
  - ApiTokenQuery: []
components:
  securitySchemes:
    ApiTokenQuery:
      type: apiKey
      in: query
      name: api_token
  parameters:
    Query:
      name: query
      in: query
      schema: { type: string }
      description: Search term to filter results by name, code, or other fields
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
      description: Page number for pagination
    PerPage:
      name: per_page
      in: query
      schema: { type: integer, minimum: 1, maximum: 100 }
      description: Items per page (max 100)
    CategoryId:
      name: category_id
      in: query
      schema: { type: integer }
      description: Filter products by category ID
    Period:
      name: period
      in: query
      description: Time period filter
      schema:
        type: string
        enum:
          [
            last_12_months,
            this_month,
            last_30_days,
            last_month,
            this_year,
            last_year,
            all,
            more,
          ]
    DateFrom:
      name: date_from
      in: query
      schema: { type: string, format: date }
      description: Required when period=more
    DateTo:
      name: date_to
      in: query
      schema: { type: string, format: date }
      description: Required when period=more
    IncludePositions:
      name: include_positions
      in: query
      schema: { type: boolean }
      description: Include positions (line items) in list responses
    Income:
      name: income
      in: query
      schema:
        type: string
        enum: ["1", "0", "yes", "no"]
      description: Set to "0" or "no" to fetch cost (expense) invoices
    ClientId:
      name: client_id
      in: query
      schema: { type: integer }
      description: Filter by client id
    Number:
      name: number
      in: query
      schema: { type: string }
      description: Filter by exact invoice number
    Kind:
      name: kind
      in: query
      schema: { $ref: "#/components/schemas/InvoiceKind" }
      description: Filter by single invoice/document kind
    Kinds:
      name: kinds[]
      in: query
      style: form
      explode: true
      schema:
        type: array
        items: { $ref: "#/components/schemas/InvoiceKind" }
      description: Filter by multiple kinds
    SearchDateType:
      name: search_date_type
      in: query
      schema:
        type: string
        enum: [issue_date, paid_date, transaction_date]
      description: Select date field for filtering
    Order:
      name: order
      in: query
      schema:
        type: string
        description: |
          Field to sort by, optionally add ".desc" for descending.
          Allowed: number, updated_at, price_net, price_gross, price_tax, issue_date, payment_to, paid_date, transaction_date, buyer_name, buyer_tax_no, seller_name, oid
    Status:
      name: status
      in: query
      schema:
        type: string
        enum: [issued, sent, paid, partial, rejected, completed]
      description: Filter by invoice status (undocumented but may work as app parameter)
    InvoiceIdsCsv:
      name: invoice_ids
      in: query
      schema: { type: string }
      description: Comma-separated invoice IDs, e.g., 123,456,789
    WarehouseId:
      name: warehouse_id
      in: query
      schema: { type: integer }
      description: Warehouse filter
  schemas:
    GTUCode:
      type: string
      description: Kody GTU (JPK_V7)
      enum:
        [
          GTU_01,
          GTU_02,
          GTU_03,
          GTU_04,
          GTU_05,
          GTU_06,
          GTU_07,
          GTU_08,
          GTU_09,
          GTU_10,
          GTU_11,
          GTU_12,
          GTU_13,
        ]
    ProcedureDesignation:
      type: string
      description: Oznaczenia procedur (JPK_V7)
      enum:
        [
          SW,
          EE,
          TP,
          TT_WNT,
          TT_D,
          MR_T,
          MR_UZ,
          I_42,
          I_63,
          B_SPV,
          B_SPV_DOSTAWA,
          B_MPV_PROWIZJA,
        ]
    InvoiceKind:
      type: string
      enum:
        [
          vat,
          proforma,
          bill,
          receipt,
          advance,
          final,
          correction,
          invoice_other,
          vat_margin,
          kp,
          kw,
          estimate,
          vat_mp,
          vat_rr,
          correction_note,
          accounting_note,
          client_order,
          dw,
          wnt,
          wdt,
          import_service,
          import_service_eu,
          import_products,
          export_products,
        ]
    InvoicePosition:
      type: object
      additionalProperties: true
      properties:
        product_id: { type: string }
        name: { type: string }
        code: { type: string }
        description: { type: string }
        # Fakturownia's JSON API returns these numeric fields as strings
        # (e.g. "500.0"). Declaring them as a number|string union makes the
        # kiota client read both representations instead of silently dropping
        # the string values — see the same handling on `tax` below.
        quantity:
          oneOf: [{ type: number }, { type: string }]
        quantity_unit: { type: string }
        tax:
          oneOf: [{ type: number }, { type: string, enum: [np, zw, disabled] }]
          description: VAT rate or special codes np, zw
        price_net:
          oneOf: [{ type: number }, { type: string }]
        price_gross:
          oneOf: [{ type: number }, { type: string }]
        total_price_net:
          oneOf: [{ type: number }, { type: string }]
        total_price_gross:
          oneOf: [{ type: number }, { type: string }]
        discount_percent: { type: number }
        discount: { type: number }
        gtu_code:
          $ref: "#/components/schemas/GTUCode"
        lump_sum_tax: { type: number, description: "Ryczałt (%)" }
    RecipientOrIssuer:
      type: object
      additionalProperties: true
      properties:
        id: { type: integer, readOnly: true }
        buyer_id: { type: string }
        name: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        tax_no: { type: string }
        company: { type: boolean }
        country: { type: string, description: "ISO 3166-1 alpha-2" }
        city: { type: string }
        post_code: { type: string }
        street: { type: string }
        phone: { type: string }
        email: { type: string }
        note: { type: string }
        role: { type: string }
        participation: { type: number }
    Invoice:
      type: object
      description: Invoice or document
      additionalProperties: true
      properties:
        app: { type: string }
        price_net: { type: string }
        price_gross: { type: string }
        seller_email: { type: string, nullable: true }
        seller_phone: { type: string, nullable: true }
        seller_tax: { type: string, nullable: true }
        seller_www: { type: string, nullable: true }
        seller_bank: { type: string, nullable: true }
        seller_bank_account: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        token: { type: string }
        buyer_www: { type: string, nullable: true }
        buyer_fax: { type: string, nullable: true }
        pattern: { type: string }
        pattern_nr: { type: string, nullable: true }
        pattern_nr_m: { type: string, nullable: true }
        pattern_nr_d: { type: string, nullable: true }
        seller_bank_account_id: { type: integer, nullable: true }
        price_tax: { type: string }
        correction: { type: boolean, nullable: true }
        buyer_note: { type: string }
        additional_info_desc: { type: string }
        additional_info: { type: string }
        product_cache: { type: string }
        from_invoice_id: { type: integer, nullable: true }
        discount: { type: string }
        sent_time: { type: string, format: date-time }
        print_time: { type: string, format: date-time }
        recurring_id: { type: integer, nullable: true }
        tax2_visible: { type: boolean, nullable: true }
        paid_date: { type: string, format: date-time, nullable: true }
        product_id: { type: integer }
        issue_year: { type: integer }
        internal_note: { type: string, nullable: true }
        invoice_id: { type: integer, nullable: true }
        invoice_template_id: { type: integer }
        seller_tax_no_kind: { type: string, nullable: true }
        sell_date_kind: { type: string, nullable: true }
        discount_kind: { type: string }
        from_api: { type: boolean }
        category_id: { type: integer, nullable: true }
        warehouse_document_id: { type: integer, nullable: true }
        exchange_rate: { type: string }
        use_delivery_address: { type: boolean }
        delivery_address: { type: string, nullable: true }
        buyer_person: { type: string, nullable: true }
        buyer_bank_account: { type: string, nullable: true }
        buyer_bank: { type: string, nullable: true }
        buyer_mass_payment_code: { type: string, nullable: true }
        show_attachments: { type: boolean }
        has_attachments: { type: boolean }
        exchange_date: { type: string, format: date-time, nullable: true }
        attachments_count: { type: integer }
        delivery_date: { type: string, format: date }
        fiscal_status: { type: string, nullable: true }
        use_moss: { type: boolean }
        email_status: { type: string }
        exclude_from_stock_level: { type: boolean }
        exclude_from_accounting: { type: boolean }
        exchange_rate_den: { type: string }
        exchange_currency_rate_den: { type: string }
        accounting_scheme: { type: string, nullable: true }
        exchange_difference: { type: string }
        not_cost: { type: boolean }
        issuer: { type: string, nullable: true }
        use_issuer: { type: boolean }
        cancelled: { type: boolean }
        test: { type: boolean }
        discount_net: { type: string }
        approval_status: { type: string, nullable: true }
        accounting_other_tax_date:
          { type: string, format: date-time, nullable: true }
        accounting_status: { type: string, nullable: true }
        normalized_number: { type: string, nullable: true }
        na_tax_kind: { type: string, nullable: true }
        issued_to_receipt: { type: boolean }
        gov_id: { type: string, nullable: true }
        gov_kind: { type: string, nullable: true }
        gov_status: { type: string, nullable: true }
        gov_send_date: { type: string, format: date-time, nullable: true }
        gov_sell_date: { type: string, format: date-time, nullable: true }
        gov_error_messages:
          type: array
          nullable: true
          items: { type: string }
        gov_verification_link: { type: string, nullable: true }
        gov_link: { type: string, nullable: true }
        gov_corrected_invoice_number: { type: string, nullable: true }
        sales_code: { type: string, nullable: true }
        additional_invoice_field: { type: string, nullable: true }
        products_margin: { type: string, nullable: true }
        payment_url: { type: string }
        view_url: { type: string }
        buyer_mobile_phone: { type: string, nullable: true }
        kind_text: { type: string }
        invoice_for_receipt_id: { type: integer, nullable: true }
        receipt_for_invoice_id: { type: integer, nullable: true }
        recipient_company: { type: string, nullable: true }
        recipient_first_name: { type: string, nullable: true }
        recipient_last_name: { type: string, nullable: true }
        get_tax_name: { type: string }
        get_tax2_name: { type: string }
        tax_name_type: { type: string }
        id: { type: integer, readOnly: true }
        invoice_ids:
          type: array
          items: { type: integer }
          description: Array of related invoice IDs (e.g., for corrections or copying)
        copy_invoice_from: { type: integer }
        number: { type: string, nullable: true }
        kind: { $ref: "#/components/schemas/InvoiceKind" }
        income:
          type: string
          enum: ["1", "0"]
        issue_date: { type: string, format: date }
        paid: { type: string }
        place: { type: string }
        sell_date: { type: string }
        transaction_date: { type: string }
        payment_to: { type: string }
        payment_to_kind:
          oneOf: [{ type: string }, { type: string, enum: [other_date, off] }]
        payment_type: { type: string }
        status:
          {
            type: string,
            enum: [issued, sent, paid, partial, rejected, completed],
          }
        currency: { type: string }
        lang: { type: string }
        department_id: { type: integer }
        client_id: { type: string }
        buyer_company:
          type: string
          enum: ["1", "0"]
        buyer_name: { type: string }
        buyer_tax_no: { type: string }
        buyer_tax_no_kind: { type: string }
        buyer_street: { type: string }
        buyer_post_code: { type: string }
        buyer_city: { type: string }
        buyer_country: { type: string }
        buyer_phone: { type: string }
        buyer_email: { type: string }
        buyer_first_name: { type: string }
        buyer_last_name: { type: string }
        seller_name: { type: string }
        seller_tax_no: { type: string }
        seller_street: { type: string }
        seller_post_code: { type: string }
        seller_city: { type: string }
        seller_country: { type: string }
        seller_person: { type: string }
        user_id: { type: integer }
        use_invoice_issuer:
          type: string
          enum: ["1", "0"]
        invoice_issuer: { type: string }
        recipient_id: { type: string }
        recipient_name: { type: string }
        recipient_tax_no: { type: string }
        recipient_street: { type: string }
        recipient_post_code: { type: string }
        recipient_city: { type: string }
        recipient_country: { type: string }
        recipient_email: { type: string }
        recipient_phone: { type: string }
        recipient_note: { type: string }
        show_discount:
          type: string
          enum: [1, 0]
          description: Enable and show discount field on the invoice
        accounting_kind:
          type: string
          description: Rodzaj wydatku dla faktur kosztowych
          enum:
            [
              purchases,
              expenses,
              media,
              salary,
              incident,
              fuel0,
              fuel_expl75,
              fuel_expl100,
              fixed_assets,
              fixed_assets50,
              no_vat_deduction,
            ]
        description: { type: string }
        description_footer: { type: string }
        description_long: { type: string }
        oid: { type: string }
        oid_unique: { type: string, enum: [yes, no] }
        warehouse_id: { type: string }
        use_oss:
          type: string
          enum: ["1", "0"]
        identify_oss:
          type: string
          enum: ["1", "0"]
        split_payment:
          type: string
          enum: ["1", "0"]
        gtu_codes:
          type: array
          items:
            $ref: "#/components/schemas/GTUCode"
        procedure_designations:
          type: array
          items:
            $ref: "#/components/schemas/ProcedureDesignation"
        reverse_charge: { type: boolean }
        corrected_content_before: { type: string }
        corrected_content_after: { type: string }
        exchange_currency:
          { type: string, description: "Waluta przeliczenia, np. PLN" }
        exchange_kind:
          type: string
          description: Źródło kursu waluty
          enum: [ecb, nbp, cbr, nbu, nbg, own]
        exchange_currency_rate:
          { type: number, description: "Własny kurs (gdy exchange_kind=own)" }
        exchange_note: { type: string }
        skonto_active:
          type: string
          enum: ["1", "0"]
        skonto_discount_date: { type: string, format: date }
        skonto_discount_value: { type: string }
        accounting_vat_tax_date: { type: string, format: date }
        accounting_income_tax_date: { type: string, format: date }
        recipients:
          type: array
          items: { $ref: "#/components/schemas/RecipientOrIssuer" }
        issuers:
          type: array
          items: { $ref: "#/components/schemas/RecipientOrIssuer" }
        positions:
          type: array
          items: { $ref: "#/components/schemas/InvoicePosition" }
    Client:
      type: object
      additionalProperties: true
      properties:
        id: { type: integer, readOnly: true }
        name: { type: string }
        shortcut: { type: string }
        tax_no_kind: { type: string }
        tax_no: { type: string }
        register_number: { type: string }
        post_code: { type: string }
        city: { type: string }
        street: { type: string }
        country: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        email: { type: string }
        phone: { type: string }
        mobile_phone: { type: string }
        www: { type: string }
        note: { type: string }
        company:
          type: string
          enum: ["1", "0"]
        discount: { type: string }
        default_tax: { type: string }
        price_list_id: { type: integer }
        default_payment_type: { type: string }
        payment_to_kind:
          oneOf: [{ type: string }, { type: string, enum: [other_date, off] }]
        disable_auto_reminders:
          type: string
          enum: ["1", "0"]
        external_id: { type: integer }
        tag_list:
          type: array
          items: { type: string }
    FakturowniaGusLookupRequest:
      type: object
      additionalProperties: false
      required: [type, numer]
      properties:
        type:
          type: string
          enum: [nip, regon, krs]
        numer:
          type: string
          description: Company identifier to look up in GUS.
        code:
          type: string
          nullable: true
        mode:
          type: string
          nullable: true
    FakturowniaGusLookupResult:
      type: object
      additionalProperties: true
      properties:
        regon: { type: string }
        nip: { type: string }
        krs: { type: string }
        name: { type: string }
        street: { type: string }
        city: { type: string }
        post_code: { type: string }
        fax: { type: string }
        phone: { type: string }
        email: { type: string }
        www: { type: string }
    FakturowniaGusLookupResponse:
      type: object
      additionalProperties: true
      properties:
        results:
          $ref: "#/components/schemas/FakturowniaGusLookupResult"
        errors:
          type: array
          items: { type: string }
        notices:
          type: array
          items: { type: string }
    Product:
      type: object
      additionalProperties: true
      properties:
        id: { type: integer, readOnly: true }
        name: { type: string }
        code: { type: string }
        ean_code: { type: string }
        description: { type: string }
        price_net: { type: string }
        price_gross: { type: string }
        currency: { type: string }
        tax:
          oneOf: [{ type: string }, { type: string, enum: [np, zw, disabled] }]
        category_id: { type: string }
        service:
          type: string
          enum: ["1", "0"]
        electronic_service:
          type: string
          enum: ["1", "0"]
        limited:
          type: string
          enum: ["1", "0"]
        stock_level: { type: string }
        package:
          type: string
          enum: ["1", "0"]
        quantity_unit: { type: string }
        gtu_codes:
          type: array
          items: { type: string }
        use_moss:
          type: string
          enum: ["1", "0"]
    PriceListPosition:
      type: object
      additionalProperties: true
      properties:
        id: { type: integer, readOnly: true }
        priceable_id: { type: integer }
        priceable_name: { type: string }
        priceable_type: { type: string, enum: [Product] }
        use_percentage:
          type: string
          enum: ["1", "0"]
        percentage: { type: string, nullable: true }
        price_net: { type: string }
        price_gross: { type: string }
        use_tax:
          type: string
          enum: ["1", "0"]
        tax:
          oneOf: [{ type: string }, { type: string, enum: [np, zw, disabled] }]
    PriceList:
      type: object
      additionalProperties: true
      properties:
        id: { type: integer, readOnly: true }
        name: { type: string }
        description: { type: string }
        currency: { type: string }
        deleted: { type: boolean }
        account_id: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        price_list_positions:
          type: array
          description: Array of price list positions (used in GET responses)
          items:
            $ref: "#/components/schemas/PriceListPosition"
        price_list_positions_attributes:
          type: object
          description: Object map of price list positions (used in POST/PUT requests)
          additionalProperties:
            $ref: "#/components/schemas/PriceListPosition"
    WarehouseAction:
      type: object
      additionalProperties: true
      properties:
        product_id: { type: string }
        product_name: { type: string }
        purchase_tax: { type: string }
        purchase_price_net: { type: string }
        tax:
          oneOf: [{ type: string }, { type: string, enum: [np, zw, disabled] }]
        price_net: { type: string }
        quantity: { type: string }
        warehouse2_id: { type: string }
    WarehouseDocument:
      type: object
      additionalProperties: true
      properties:
        id: { type: integer, readOnly: true }
        kind: { type: string, enum: [mm, pz, wz] }
        number: { type: string, nullable: true }
        warehouse_id: { type: string }
        issue_date: { type: string, format: date }
        department_id: { type: integer }
        department_name: { type: string }
        client_id: { type: string }
        client_name: { type: string }
        warehouse_actions:
          type: array
          items: { $ref: "#/components/schemas/WarehouseAction" }
    BankingPayment:
      type: object
      additionalProperties: true
      properties:
        id: { type: integer, readOnly: true }
        description: { type: string, nullable: true }
        comment: { type: string, nullable: true }
        invoice_comment: { type: string, nullable: true }
        provider: { type: string }
        provider_title: { type: string }
        provider_status: { type: string }
        paid: { type: boolean }
        paid_date: { type: string, format: date, nullable: true }
        price: { type: string }
        currency: { type: string }
        generate_invoice: { type: boolean }
        invoice_name: { type: string, nullable: true }
        invoice_tax_no: { type: string, nullable: true }
        post_code: { type: string, nullable: true }
        city: { type: string, nullable: true }
        street: { type: string, nullable: true }
        country: { type: string, nullable: true }
        email: { type: string }
        phone: { type: string, nullable: true }
        first_name: { type: string, nullable: true }
        last_name: { type: string, nullable: true }
        invoice_id: { type: string, nullable: true }
        client_id: { type: string, nullable: true }
        department_id: { type: integer, nullable: true }
        product_id: { type: string, nullable: true }
        user_id: { type: string, nullable: true }
        token: { type: string }
        name: { type: string }
        oid: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        invoice_country: { type: string, nullable: true }
