  /account.json:
    get:
      tags: [Account]
      summary: Get account info
      parameters:
        - name: integration_token
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Account info
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      tags: [Account]
      summary: Create account (partner flow)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              properties:
                account:
                  type: object
                  properties:
                    prefix: { type: string }
                    lang: { type: string }
                    integration_fast_login: { type: boolean }
                    integration_logout_url: { type: string }
                user:
                  type: object
                  properties:
                    login: { type: string }
                    email: { type: string }
                    password: { type: string }
                    from_partner: { type: string }
                company:
                  type: object
                  additionalProperties: true
                integration_token:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  prefix: { type: string }
                  api_token: { type: string }
                  url: { type: string }
                  login: { type: string }
                  email: { type: string }

  /account/add_user.json:
    post:
      tags: [Account]
      summary: Add/invite user to account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user]
              properties:
                integration_token: { type: string }
                user:
                  type: object
                  required: [invite, email]
                  properties:
                    invite:
                      {
                        type: boolean,
                        description: "true if user exists; false to create",
                      }
                    email: { type: string }
                    password: { type: string }
                    role:
                      {
                        type: string,
                        description: "member | admin | accountant | role_{id} | {id}",
                      }
                    department_ids:
                      type: array
                      items: { type: integer }
      responses:
        "200":
          description: User added/invited
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /account/delete.json:
    post:
      tags: [Account]
      summary: Request account deletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                api_token: { type: string }
      responses:
        "200":
          description: Deletion link sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: string }
                  message: { type: string }

  /account/unlink.json:
    patch:
      tags: [Account]
      summary: Unlink subdomains from accounting office
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              oneOf:
                - properties:
                    prefix: { type: string }
                - properties:
                    prefix:
                      type: array
                      items: { type: string }
      responses:
        "200":
          description: Unlink result
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: string }
                  message: { type: string }
                  result:
                    type: object
                    properties:
                      unlinked:
                        type: array
                        items: { type: string }
                      not_unlinked:
                        type: array
                        items: { type: string }
